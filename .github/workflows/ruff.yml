name: Ruff

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Install pinned Python
      run: uv python install
    - name: Sync project
      run: uv sync --dev
    - name: Testing code with ruff
      run: uv run -m ruff check
